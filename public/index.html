<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pokemon Pack Shop</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="wrap header">
    <div class="brand">
      <div class="logo">⚡</div>
      <div>
        <h1>Pokemon Pack Shop</h1>
        <p class="sub">
          Reserve packs for stream pulls • Inventory updates instantly
          <span class="pill">Hold: 60 min</span>
        </p>
        <p class="links">
          <span>DM to claim with your reservation code</span>
        </p>
      </div>
    </div>

    <div class="panel">
      <div class="panelTitle">How reservations work</div>
      <ol class="steps">
        <li>Select qty → tap <strong>Reserve</strong></li>
        <li>You’ll get a reservation code</li>
        <li>Message me the code to claim</li>
      </ol>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <input id="search" class="search" placeholder="Search packs (e.g., Ascended, ETB)..." />
      <select id="sort" class="sort">
        <option value="name">Sort: Name</option>
        <option value="priceAsc">Sort: Price (low → high)</option>
        <option value="priceDesc">Sort: Price (high → low)</option>
        <option value="stockDesc">Sort: Stock (high → low)</option>
      </select>
    </div>

    <div id="grid" class="grid"></div>
    <div id="toast" class="toast" aria-live="polite"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
